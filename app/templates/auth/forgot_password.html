{% extends "base_auth.html" %}
{% block title %}Forgot Password | {{ app_name }}{% endblock %}
{% block content %}
<h4 class="mb-2">Forgot Password?</h4>
<p class="mb-4">Enter your email and the backend can be connected to your mail service for reset links.</p>

<form class="mb-3" method="post">
  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" />
  </div>
  <button class="btn btn-primary d-grid w-100" type="submit">Send reset link</button>
</form>

<div class="text-center">
  <a href="{{ url_for('auth.login') }}">
    <span class="lottie-icon me-1" data-lottie="arrow-left" aria-hidden="true"></span>
    Back to login
  </a>
</div>
{% endblock %}
