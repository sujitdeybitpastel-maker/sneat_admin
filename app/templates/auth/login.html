{% extends "base_auth.html" %}
{% block title %}Login | {{ app_name }}{% endblock %}
{% block content %}
<h4 class="mb-2">Welcome back</h4>
<p class="mb-4">Sign in to monitor imports, exports, sales, products, and users.</p>

<form class="mb-3" method="post">
  <div class="mb-3">
    <label for="identity" class="form-label">Email or Username</label>
    <input type="text" class="form-control" id="identity" name="identity" placeholder="Enter your email or username" autofocus />
  </div>
  <div class="mb-3 form-password-toggle">
    <div class="d-flex justify-content-between">
      <label class="form-label" for="password">Password</label>
      <a href="{{ url_for('auth.forgot_password') }}"><small>Forgot Password?</small></a>
    </div>
    <div class="input-group input-group-merge">
      <input type="password" id="password" class="form-control" name="password" placeholder="••••••••••••" />
      <span class="input-group-text cursor-pointer"><span class="lottie-icon" data-lottie="eye" aria-hidden="true"></span></span>
    </div>
  </div>
  <div class="mb-3">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="remember" name="remember" />
      <label class="form-check-label" for="remember">Remember Me</label>
    </div>
  </div>
  <div class="mb-3">
    <button class="btn btn-primary d-grid w-100" type="submit">Sign in</button>
  </div>
</form>

<div class="text-center small text-muted">
  Demo admin: <strong>admin</strong> / <strong>admin123</strong><br />
  Demo user: <strong>maya</strong> / <strong>user123</strong>
</div>
{% endblock %}
